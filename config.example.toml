# =============================================================================
# 必填：LLM 配置
# api_key 可以直接填字符串，也可以用 ${ENV_VAR} 引用环境变量。
# =============================================================================

[llm]
provider = "deepseek"

[llm.main]
# 主模型，必填。推荐 deepseek-v4-flash（agent 能力强、价格低）。
model = "deepseek-v4-flash"
api_key = "sk-..."
base_url = "https://api.deepseek.com/v1"
enable_thinking = true
multimodal = false

[llm.fast]
# 轻量模型，用于 memory gate / query rewrite / HyDE。
# 不填则退回主模型，但延迟会稍高。
model = "qwen-flash"
api_key = "sk-..."
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"

[llm.vl]
# 视觉模型，仅在 llm.main.multimodal = false 时需要。
# model 留空则不启用，图片会作为路径传给主模型。
model = "qwen-vl-plus"
api_key = "sk-..."
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"

# =============================================================================
# Agent 行为
# =============================================================================

[agent]
system_prompt = "You are Akashic, a helpful AI assistant with access to tools. Always respond in the same language the user uses."
max_tokens = 8192
# 设为 0 表示不限制迭代轮数；长任务仍可用 /stop 中断。
max_iterations = 40
dev_mode = false

[agent.context]
memory_window = 40

[agent.tools]
search_enabled = true

# 可选：长期记忆整理任务（默认已启用，通常无需修改）
# [agent.maintenance]
# memory_optimizer_enabled = true
# memory_optimizer_interval_seconds = 10800

# 可选：控制加载哪些工具集（默认值适合大多数场景）
# [agent.wiring]
# toolsets = ["meta_common", "spawn", "schedule", "mcp"]

# =============================================================================
# 必填：至少配置一个频道（Telegram 或 QQ 选其一）
# token / bot_uin 为空时该频道自动跳过，不会报错。
# =============================================================================

[channels.telegram]
# BotFather 给的 bot token，格式：123456789:AAF...
token = ""
# 你的 Telegram 用户名（不带 @），只有白名单用户才能使用 bot。
allow_from = ["your_username"]

[channels.qq]
# 填 QQ 号启用 QQ 频道，留空跳过。
bot_uin = ""
allow_from = ["your_qq_number"]
websocket_open_timeout_seconds = 5.0

# 可选：允许在群组中使用（@bot 触发）
# [[channels.qq.groups]]
# group_id = "123456789"
# allow_from = ["your_qq_number"]
# require_at = true

[channels.qqbot]
# 官方 QQBot，和 NapCat QQ 通道并存。留空跳过。
app_id = ""
client_secret = ""
# 私聊白名单使用官方 user_openid。
allow_from = []

# 当前实现仅启用私聊；群配置先保留为后续扩展占位。
# [[channels.qqbot.groups]]
# group_openid = "GROUP_OPENID"
# allow_from = ["MEMBER_OPENID"]
# require_at = true
# allow_proactive = false

# =============================================================================
# 语义记忆
# default memory 的检索阈值在 plugins/default_memory/config.local.toml。
# =============================================================================

[memory]
enabled = true
# 语义记忆 engine 选择。留空等同 default。
engine = ""

[memory.embedding]
model = "text-embedding-v3"
api_key = "sk-..."
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"

# =============================================================================
# Document RAG（可选，默认关闭）
# =============================================================================

[doc_rag]
enabled = false
source_root = "."
store_path = "~/.akashic/workspace/doc_rag/doc_rag.db"
collection_id = "default"

[doc_rag.sources]
include_globs = ["my_md/doc_rag_corpus/**/*.md"]
exclude_globs = [
  "**/*.db",
  "**/*.sqlite",
  "**/*.jsonl",
  "**/*.log",
  "**/__pycache__/**",
  "**/.pytest_cache/**"
]
allowed_extensions = [".md", ".markdown"]
max_file_size_bytes = 2097152
allow_external_symlink = false

[doc_rag.chunking]
chunker_version = "heading_block_v0"
target_chunk_chars = 1600
max_chunk_chars = 2400
min_chunk_chars = 300
chunk_overlap_chars = 200

[doc_rag.embedding]
mode = "inherit_memory"
model = ""
api_key = ""
base_url = ""
dim = 1024
batch_size = 16
max_retries = 2
timeout_seconds = 30

[doc_rag.retrieval]
top_k = 5
similarity_threshold = 0.45
retrieval_mode = "vector_only"
fallback_enabled = true

[doc_rag.trace]
enabled = true
format = "jsonl"
path = "~/.akashic/workspace/doc_rag/retrieval_traces.jsonl"
include_content = false
max_content_chars = 2000

[doc_rag.citation]
required_for_doc_answer = true
format = "[source_path > heading_path]"
include_chunk_id_for_debug = false
on_no_hits = "state_no_evidence"

[doc_rag.eval]
eval_set_path = "my_md/rag/eval_sets/doc_rag_eval_v0.jsonl"
report_dir = "my_md/rag/eval_reports"

# =============================================================================
# 主动推送（可选）
# 先跑通基本对话再开启这部分。
# =============================================================================

[proactive]
# 开启后 agent 会主动向你推送消息。需要先填好下方 chat_id 再设为 true。
enabled = false
profile = "daily"

[proactive.target]
channel = "telegram"
# 你的 Telegram user id（向 bot 发一条消息后从日志里可以拿到）。
# 官方 QQBot 私聊可填：channel = "qqbot"，chat_id = "c2c:USER_OPENID"
chat_id = ""

[proactive.agent]
max_steps = 35
content_limit = 5
web_fetch_max_chars = 8000
context_prob = 0.03
delivery_cooldown_hours = 1

[proactive.drift]
# Drift：无可推送内容时 agent 自主做任务。建议先跑通 proactive 再开启。
enabled = false
max_steps = 20
min_interval_hours = 3

# =============================================================================
# 其他集成（可选）
# =============================================================================

[integrations.fitbit]
enabled = false

# 可选：接入外部 Peer Agent（如 DeepResearch）
